<style>
/* === CAPA 1: bloqueo de selección y click derecho === */

html,body{overscroll-behavior:none}
#__blk{position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;color:#f00;display:none;z-index:999999;font-family:monospace;padding:40px;font-size:14px;text-align:center}
#__blk.on{display:flex;align-items:center;justify-content:center;flex-direction:column}
#__blk h1{font-size:24px;margin-bottom:20px}
</style>

<div id="__blk">
<h1>⛔ ACCESO BLOQUEADO</h1>
<p>Se detectaron herramientas de desarrollo o un entorno no autorizado.</p>
<p style="margin-top:20px;opacity:.6">Juanseled NovaStar Hub · Sistema protegido</p>
<p style="margin-top:20px;font-size:11px;opacity:.4">Cerrá las DevTools y recargá la página.</p>
</div>

<div id="__app"></div>

<script>
// ============================================
// CAPA DE PROTECCIÓN - JUANSELED NOVASTAR HUB
// ============================================
(function(){
  'use strict';

  // --- Anti-iframe (no permite ser embebido) ---
  if(window.top!==window.self){try{window.top.location=window.self.location}catch(e){document.body.innerHTML='';return}}

  // --- Bloquear click derecho ---
  document.addEventListener('contextmenu',function(e){e.preventDefault();return false},true);

  // --- Bloquear teclas peligrosas ---
  document.addEventListener('keydown',function(e){
    var k=e.keyCode||e.which;
    var c=(e.key||'').toLowerCase();
    // F12
    if(k===123){e.preventDefault();return false}
    // Ctrl+U (ver fuente)
    if(e.ctrlKey&&c==='u'){e.preventDefault();return false}
    // Ctrl+S (guardar)
    if(e.ctrlKey&&c==='s'){e.preventDefault();return false}
    // Ctrl+P (imprimir)
    if(e.ctrlKey&&c==='p'){e.preventDefault();return false}
    // Ctrl+A (seleccionar todo)
    if(e.ctrlKey&&c==='a'){e.preventDefault();return false}
    // Ctrl+Shift+I / J / C / K (devtools)
    if(e.ctrlKey&&e.shiftKey&&(c==='i'||c==='j'||c==='c'||c==='k')){e.preventDefault();return false}
    // Cmd equivalentes en Mac
    if(e.metaKey&&e.altKey&&(c==='i'||c==='j'||c==='c')){e.preventDefault();return false}
    if(e.metaKey&&c==='u'){e.preventDefault();return false}
    if(e.metaKey&&c==='s'){e.preventDefault();return false}
  },true);

  // --- Bloquear copiar/cortar/arrastrar ---
  ['copy','cut','dragstart','selectstart'].forEach(function(ev){
    document.addEventListener(ev,function(e){
      var t=e.target;
      if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'))return true;
      e.preventDefault();return false;
    },true);
  });

  // --- Detección de DevTools (método del size gap) ---
  var devtoolsOpen=false;
  function checkDT(){
    var wDiff=window.outerWidth-window.innerWidth;
    var hDiff=window.outerHeight-window.innerHeight;
    var threshold=160;
    if(wDiff>threshold||hDiff>threshold){
      if(!devtoolsOpen){
        devtoolsOpen=true;
        document.getElementById('__blk').classList.add('on');
        // Opcional: limpiar el contenido para que no quede expuesto
        var app=document.getElementById('__app');
        if(app)app.style.display='none';
      }
    } else {
      if(devtoolsOpen){
        devtoolsOpen=false;
        document.getElementById('__blk').classList.remove('on');
        var app2=document.getElementById('__app');
        if(app2)app2.style.display='';
      }
    }
  }
  setInterval(checkDT,500);

  // --- Detección por timing del debugger ---
  setInterval(function(){
    var start=new Date();
    (function(){}).constructor('debugger')();
    var end=new Date();
    if(end-start>100){
      document.getElementById('__blk').classList.add('on');
    }
  },2000);

  // --- Anti consola (sobrescribe console) ---
  try{
    var noop=function(){};
    ['log','warn','error','info','debug','table','dir','trace','clear'].forEach(function(m){
      try{console[m]=noop}catch(e){}
    });
  }catch(e){}

  // --- Bloquear impresión ---
  window.addEventListener('beforeprint',function(e){
    document.body.style.display='none';
  });
  window.addEventListener('afterprint',function(e){
    document.body.style.display='';
  });

})();
</script>
